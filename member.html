<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DM管理 メンバー</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F5F4F0; --surface: #FFFFFF; --surface2: #EEEDE8;
  --border: rgba(0,0,0,0.07); --border2: rgba(0,0,0,0.13);
  --text: #1A1916; --text2: #6B6860; --text3: #A09E98;
  --accent-a: #2563EB; --accent-a-bg: #EFF6FF; --accent-a-text: #1D4ED8;
  --accent-b: #16A34A; --accent-b-bg: #F0FDF4; --accent-b-text: #15803D;
  --danger: #DC2626; --danger-bg: #FEF2F2;
  --success: #16A34A; --success-bg: #F0FDF4;
  --warned: #D97706; --warned-bg: #FFFBEB;
  --purple: #7C3AED; --purple-bg: #F5F3FF;
  --discord: #5865F2;
  --mono: 'DM Mono', monospace; --sans: 'Noto Sans JP', sans-serif;
  --r: 14px; --r-sm: 10px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body { font-family: var(--sans); background: var(--bg); color: var(--text); font-size: 15px; line-height: 1.5; display: flex; flex-direction: column; }

.nav { display: flex; background: var(--surface); border-top: 1px solid var(--border2); position: fixed; bottom: 0; left: 0; right: 0; padding-bottom: var(--safe-bottom); z-index: 100; }
.nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 9px 2px 7px; cursor: pointer; gap: 2px; border: none; background: none; font-family: var(--sans); }
.nav-item:active { opacity: 0.6; }
.nav-icon { font-size: 20px; line-height: 1; }
.nav-label { font-size: 9px; font-weight: 500; color: var(--text3); }
.nav-item.active .nav-label { color: var(--accent-a); }

.pages { flex: 1; overflow: hidden; position: relative; }
.page { position: absolute; inset: 0; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; padding: 16px 16px calc(76px + var(--safe-bottom)); display: none; }
.page.active { display: block; }

.page-header { margin-bottom: 18px; }
.page-header h2 { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; }
.page-header .sub { font-size: 12px; color: var(--text3); margin-top: 2px; }

.card { background: var(--surface); border-radius: var(--r); padding: 16px; margin-bottom: 12px; border: 1px solid var(--border); }
.card-label { font-size: 11px; font-weight: 700; color: var(--text3); letter-spacing: 0.07em; text-transform: uppercase; margin-bottom: 12px; }

.field { margin-bottom: 12px; }
.field:last-child { margin-bottom: 0; }
.field label { display: block; font-size: 12px; font-weight: 500; color: var(--text2); margin-bottom: 6px; }
.field input, .field select {
  width: 100%; font-family: var(--sans); font-size: 16px; padding: 13px 14px;
  border: 1px solid var(--border2); border-radius: var(--r-sm);
  background: var(--bg); color: var(--text); outline: none; appearance: none; -webkit-appearance: none;
}
.field input:focus, .field select:focus { border-color: var(--accent-a); background: var(--surface); }
.field-error { font-size: 12px; color: var(--danger); margin-top: 5px; display: none; }
.field-error.show { display: block; }

.btn { display: flex; align-items: center; justify-content: center; gap: 6px; width: 100%; font-family: var(--sans); font-size: 16px; font-weight: 700; padding: 15px; border-radius: var(--r-sm); border: none; cursor: pointer; transition: opacity 0.15s, transform 0.1s; }
.btn:active { transform: scale(0.97); }
.btn-primary { background: var(--text); color: var(--surface); }
.btn-discord { background: var(--discord); color: #fff; }
.btn-copy { background: var(--accent-a-bg); color: var(--accent-a-text); font-size: 15px; padding: 14px; }
.btn-mt { margin-top: 12px; }

.alert { font-size: 13px; padding: 12px 14px; border-radius: var(--r-sm); margin-top: 10px; display: none; line-height: 1.5; }
.alert.show { display: block; }
.alert-danger { background: var(--danger-bg); color: var(--danger); }
.alert-success { background: var(--success-bg); color: var(--success); }

.badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 700; font-family: var(--mono); }
.b-a { background: var(--accent-a-bg); color: var(--accent-a-text); }
.b-b { background: var(--accent-b-bg); color: var(--accent-b-text); }

.list-item { display: flex; align-items: flex-start; padding: 14px 0; border-bottom: 1px solid var(--border); gap: 10px; }
.list-item:last-child { border-bottom: none; }
.list-main { flex: 1; min-width: 0; }
.list-id { font-family: var(--mono); font-size: 14px; font-weight: 500; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.list-date { font-size: 11px; color: var(--text3); font-family: var(--mono); margin-top: 4px; }

.search-wrap { position: relative; margin-bottom: 12px; }
.search-wrap input { width: 100%; font-size: 16px; font-family: var(--sans); padding: 12px 14px 12px 42px; border: 1px solid var(--border2); border-radius: var(--r-sm); background: var(--surface); color: var(--text); outline: none; }
.search-wrap input:focus { border-color: var(--accent-a); }
.search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 18px; pointer-events: none; }

.filter-bar { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 14px; scrollbar-width: none; }
.filter-bar::-webkit-scrollbar { display: none; }
.chip { flex-shrink: 0; font-size: 13px; font-weight: 500; padding: 7px 16px; border-radius: 20px; border: 1px solid var(--border2); background: var(--surface); color: var(--text2); cursor: pointer; font-family: var(--sans); white-space: nowrap; }
.chip.on { background: var(--text); color: var(--surface); border-color: var(--text); }

.dup-result { text-align: center; padding: 24px 16px; border-radius: var(--r-sm); display: none; }
.dup-result.show { display: block; }
.dup-result.ok { background: var(--success-bg); }
.dup-result.ng { background: var(--danger-bg); }
.dup-result.checking { background: var(--surface2); }
.dup-result .big-icon { font-size: 48px; margin-bottom: 8px; }
.dup-result .big-text { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
.dup-result .small-text { font-size: 13px; }
.dup-result.ok .big-text { color: var(--success); }
.dup-result.ng .big-text { color: var(--danger); }
.dup-result.ok .small-text { color: var(--success); }
.dup-result.ng .small-text { color: var(--danger); }
.dup-result.checking .big-text { color: var(--text2); }
.dup-result.checking .small-text { color: var(--text3); }

.tpl-preview { background: var(--bg); border: 1px solid var(--border2); border-radius: var(--r-sm); padding: 14px; font-size: 13px; line-height: 2.0; white-space: pre-wrap; word-break: break-all; color: var(--text); font-family: var(--sans); margin-bottom: 12px; user-select: text; }
.tpl-var-empty { color: var(--warned); font-weight: 700; background: var(--warned-bg); border-radius: 3px; padding: 0 2px; }
.tpl-var-filled { color: var(--accent-a); font-weight: 700; }

.check-result { display: none; align-items: center; gap: 10px; padding: 14px; border-radius: var(--r-sm); margin-bottom: 12px; }
.check-result.show { display: flex; }
.check-result.ok { background: var(--success-bg); color: var(--success); }
.check-result.ng { background: var(--danger-bg); color: var(--danger); }
.check-icon { font-size: 24px; flex-shrink: 0; }
.check-text { font-size: 14px; font-weight: 500; line-height: 1.5; }

.input-group { background: var(--accent-a-bg); border-radius: var(--r-sm); padding: 12px 14px; margin-bottom: 12px; }
.input-group-label { font-size: 11px; font-weight: 700; color: var(--accent-a-text); letter-spacing: 0.06em; margin-bottom: 10px; }
.input-group .field { margin-bottom: 10px; }
.input-group .field:last-child { margin-bottom: 0; }
.input-group .field label { color: var(--accent-a-text); }
.input-group .field input { background: var(--surface); border-color: rgba(37,99,235,0.2); }

.empty { text-align: center; padding: 48px 0; color: var(--text3); font-size: 14px; }
.spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border2); border-top-color: var(--accent-a); border-radius: 50%; animation: spin 0.7s linear infinite; }
.spinner-lg { width: 32px; height: 32px; border-width: 3px; }
@keyframes spin { to { transform: rotate(360deg); } }
.list-loading { text-align: center; padding: 40px 0; }
.refresh-btn { font-size: 12px; font-weight: 700; padding: 7px 16px; border-radius: 20px; border: 1px solid var(--border2); background: var(--surface); color: var(--text2); cursor: pointer; font-family: var(--sans); }

/* ── ニックネームバナー ── */
.nickname-banner {
  border-radius: var(--r);
  padding: 14px 16px;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 12px;
  background: linear-gradient(135deg, #1e3a8a 0%, #2563EB 100%);
}
.nickname-banner.unset {
  background: linear-gradient(135deg, #92400e 0%, #D97706 100%);
}
.nn-icon { font-size: 26px; flex-shrink: 0; }
.nn-body { flex: 1; min-width: 0; }
.nn-label { font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.65); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 2px; }
.nn-value { font-size: 17px; font-weight: 700; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.nn-value.placeholder { opacity: 0.65; font-size: 14px; }
.nn-change-btn { font-size: 12px; color: rgba(255,255,255,0.8); background: rgba(255,255,255,0.18); border: none; border-radius: 6px; padding: 6px 12px; cursor: pointer; font-family: var(--sans); font-weight: 600; white-space: nowrap; flex-shrink: 0; }
.nn-change-btn:active { opacity: 0.7; }

/* ── ニックネーム設定モーダル ── */
.nn-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.45);
  z-index: 200;
  display: flex; align-items: flex-end; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: opacity 0.2s;
}
.nn-overlay.open { opacity: 1; pointer-events: all; }
.nn-sheet {
  background: var(--surface);
  border-radius: 20px 20px 0 0;
  padding: 24px 20px calc(24px + var(--safe-bottom));
  width: 100%; max-width: 480px;
  transform: translateY(24px);
  transition: transform 0.25s ease;
}
.nn-overlay.open .nn-sheet { transform: translateY(0); }
.nn-sheet-title { font-size: 17px; font-weight: 700; margin-bottom: 4px; }
.nn-sheet-sub { font-size: 13px; color: var(--text3); margin-bottom: 18px; line-height: 1.6; }
.nn-sheet .field { margin-bottom: 16px; }
.nn-sheet-btns { display: flex; gap: 8px; }
.nn-sheet-btns button { flex: 1; font-family: var(--sans); font-size: 15px; font-weight: 700; padding: 14px; border-radius: var(--r-sm); border: none; cursor: pointer; }
.nn-btn-cancel { background: var(--surface2); color: var(--text2); }
.nn-btn-save { background: var(--text); color: #fff; }
</style>
</head>
<body>

<!-- ニックネーム設定モーダル -->
<div class="nn-overlay" id="nn-overlay" onclick="handleOverlayClick(event)">
  <div class="nn-sheet">
    <div class="nn-sheet-title">👤 ニックネームを設定</div>
    <div class="nn-sheet-sub">納品記録に使われます。一度設定するとこの端末では保存されます。</div>
    <div class="field">
      <label for="nn-input">ニックネーム（20文字以内）</label>
      <input type="text" id="nn-input" placeholder="例: はるか" maxlength="20" autocomplete="off">
      <div class="field-error" id="err-nn">ニックネームを入力してください</div>
    </div>
    <div class="nn-sheet-btns">
      <button class="nn-btn-cancel" onclick="closeNnSheet()">キャンセル</button>
      <button class="nn-btn-save" onclick="saveNickname()">保存する</button>
    </div>
  </div>
</div>

<div class="pages">

  <!-- テンプレート -->
  <div class="page active" id="page-template">
    <div class="page-header">
      <h2>送信テンプレート</h2>
      <div class="sub">入力 → チェック → Discordに納品</div>
    </div>

    <!-- ニックネームバナー -->
    <div class="nickname-banner unset" id="nn-banner">
      <div class="nn-icon">👤</div>
      <div class="nn-body">
        <div class="nn-label">あなたのニックネーム</div>
        <div class="nn-value placeholder" id="nn-display">タップして設定してください</div>
      </div>
      <button class="nn-change-btn" onclick="openNnSheet()">設定</button>
    </div>

    <div class="card">
      <div class="card-label">① 先方の情報を入力</div>
      <div class="input-group">
        <div class="input-group-label">📨 送信先</div>
        <div class="field">
          <label for="tpl-instagram">Instagram ID（@なし）</label>
          <input type="text" id="tpl-instagram" placeholder="例: sato_bakery_tokyo" oninput="updatePreview()" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
          <div class="field-error" id="err-instagram">入力してください</div>
        </div>
        <div class="field">
          <label for="tpl-company">[先方の会社or施設]</label>
          <input type="text" id="tpl-company" placeholder="例: 〇〇ホテル" oninput="updatePreview()">
          <div class="field-error" id="err-company">入力してください</div>
        </div>
        <div class="field">
          <label for="tpl-service">[先方が売りにしているサービスやモノ]</label>
          <input type="text" id="tpl-service" placeholder="例: 高級スパ・温浴施設" oninput="updatePreview()">
          <div class="field-error" id="err-service">入力してください</div>
        </div>
        <div class="field">
          <label for="tpl-service-detail">[○○サービス]</label>
          <input type="text" id="tpl-service-detail" placeholder="例: スパ・温浴サービス" oninput="updatePreview()">
          <div class="field-error" id="err-service-detail">入力してください</div>
        </div>
        <div class="field">
          <label for="tpl-target">[集客したい季節] or [ターゲット層の年代]</label>
          <input type="text" id="tpl-target" placeholder="例: 夏 / 20〜30代女性" oninput="updatePreview()">
          <div class="field-error" id="err-target">入力してください</div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-label">② プレビュー確認</div>
      <div class="tpl-preview" id="tpl-preview">読み込み中...</div>
      <div class="check-result" id="check-result">
        <div class="check-icon" id="check-icon"></div>
        <div class="check-text" id="check-text"></div>
      </div>
      <button class="btn btn-copy btn-mt" onclick="checkAndCopy()">📋 チェックしてコピー</button>
      <button class="btn btn-discord btn-mt" id="discord-btn" style="display:none;" onclick="sendToDiscord()">📣 Discordに納品する</button>
    </div>
  </div>

  <!-- 重複チェック -->
  <div class="page" id="page-check">
    <div class="page-header">
      <h2>重複チェック</h2>
      <div class="sub">スプレッドシートをリアルタイム参照</div>
    </div>
    <div class="card">
      <div class="field">
        <label for="check-id">Instagram ID（@なし）</label>
        <input type="text" id="check-id" placeholder="例: sato_bakery_tokyo"
          autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
          oninput="liveCheck()">
      </div>
      <div class="dup-result" id="dup-result">
        <div class="big-icon" id="dup-icon"></div>
        <div class="big-text" id="dup-text"></div>
        <div class="small-text" id="dup-sub"></div>
      </div>
    </div>
  </div>

  <!-- リスト -->
  <div class="page" id="page-list">
    <div class="page-header">
      <h2>営業先リスト</h2>
      <div class="sub" id="list-sub">全員共通・閲覧のみ</div>
    </div>
    <div style="display:flex; gap:8px; align-items:center; margin-bottom:12px;">
      <div class="search-wrap" style="margin-bottom:0; flex:1;">
        <span class="search-icon">🔍</span>
        <label for="search" style="display:none;">検索</label>
        <input type="search" id="search" placeholder="IDで検索" oninput="debounceSearch()">
      </div>
      <button class="refresh-btn" onclick="loadList()">↻ 更新</button>
    </div>
    <div class="filter-bar">
      <button class="chip on" onclick="setFilter('all',this)">すべて</button>
      <button class="chip" onclick="setFilter('A',this)">Acct A</button>
      <button class="chip" onclick="setFilter('B',this)">Acct B</button>
    </div>
    <div class="card" style="padding: 0 16px;">
      <div id="list-body"></div>
      <div class="empty" id="list-empty" style="display:none;">データがありません</div>
      <div class="list-loading" id="list-loading" style="display:none;"><div class="spinner spinner-lg"></div></div>
    </div>
  </div>

</div>

<nav class="nav">
  <button class="nav-item active" onclick="goPage('template',this)"><span class="nav-icon">📝</span><span class="nav-label">テンプレ</span></button>
  <button class="nav-item" onclick="goPage('check',this)"><span class="nav-icon">🔍</span><span class="nav-label">チェック</span></button>
  <button class="nav-item" onclick="goPage('list',this)"><span class="nav-icon">📋</span><span class="nav-label">リスト</span></button>
</nav>

<script>
// ── 設定 ──
const GAS_URL = 'https://script.google.com/macros/s/AKfycbzPBGe70H7JRPflxcsOA1r0iLGRFePljhPg8Z4t773xj34WnVLF9lbJwMj4wAjFIUbObg/exec';
const DISCORD_DELIVER_WEBHOOK = 'https://discord.com/api/webhooks/1506968636257075210/W3w4j2BM53jSQ2i_vnYJGpzai4b31zLWAdNaDzWFJuACnaYy8WFlkWUlp0iaTusDINX-';

// ── 状態 ──
let selfInfo = { myCompany: '', myRep: '' };
let copiedText = '';
let currentFilter = 'all';
let checkTimer = null;
let searchTimer = null;
let nickname = localStorage.getItem('dm_nickname') || '';

// ── ニックネーム ──
function renderNickname() {
  const banner = document.getElementById('nn-banner');
  const display = document.getElementById('nn-display');
  const btn = banner.querySelector('.nn-change-btn');
  if (nickname) {
    banner.classList.remove('unset');
    display.classList.remove('placeholder');
    display.textContent = nickname;
    btn.textContent = '変更';
  } else {
    banner.classList.add('unset');
    display.classList.add('placeholder');
    display.textContent = 'タップして設定してください';
    btn.textContent = '設定';
  }
}

function openNnSheet() {
  document.getElementById('nn-input').value = nickname;
  document.getElementById('err-nn').classList.remove('show');
  document.getElementById('nn-overlay').classList.add('open');
  setTimeout(() => document.getElementById('nn-input').focus(), 250);
}

function closeNnSheet() {
  document.getElementById('nn-overlay').classList.remove('open');
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('nn-overlay')) closeNnSheet();
}

function saveNickname() {
  const val = document.getElementById('nn-input').value.trim();
  if (!val) {
    document.getElementById('err-nn').classList.add('show');
    return;
  }
  nickname = val;
  localStorage.setItem('dm_nickname', nickname);
  renderNickname();
  closeNnSheet();
}

const VARS = [
  { key: '{会社名}',      id: 'tpl-company',       errId: 'err-company',        label: '[先方の会社or施設]' },
  { key: '{先方サービス}', id: 'tpl-service',        errId: 'err-service',        label: '[先方が売りにしているサービスやモノ]' },
  { key: '{サービス詳細}', id: 'tpl-service-detail', errId: 'err-service-detail', label: '[○○サービス]' },
  { key: '{ターゲット}',  id: 'tpl-target',         errId: 'err-target',         label: '[集客したい季節] or [ターゲット層の年代]' },
];

function getVal(id) { return (document.getElementById(id)?.value || '').trim(); }

function buildFullText() {
  let front = buildTemplateFront();
  let back = buildTemplateBack();
  VARS.forEach(v => { front = front.split(v.key).join(getVal(v.id)); });
  front = front.split('{自社名}').join(selfInfo.myCompany);
  front = front.split('{代表者名}').join(selfInfo.myRep);
  back = back.split('{自社名}').join(selfInfo.myCompany);
  back = back.split('{代表者名}').join(selfInfo.myRep);
  return front + back;
}

function updatePreview() {
  document.getElementById('check-result').classList.remove('show');
  document.getElementById('discord-btn').style.display = 'none';

  let tpl = buildTemplateFront();
  VARS.forEach(v => {
    const val = getVal(v.id);
    if (val) tpl = tpl.split(v.key).join('\x01' + val + '\x01');
  });
  if (selfInfo.myCompany) tpl = tpl.split('{自社名}').join('\x01' + selfInfo.myCompany + '\x01');
  if (selfInfo.myRep) tpl = tpl.split('{代表者名}').join('\x01' + selfInfo.myRep + '\x01');

  const escaped = tpl.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  let html = escaped;
  VARS.forEach(v => {
    html = html.replace(new RegExp(v.key.replace(/[{}]/g,'\\$&'), 'g'), `<span class="tpl-var-empty">${v.key}</span>`);
  });
  html = html.replace(/\{自社名\}/g, '<span class="tpl-var-empty">{自社名}</span>');
  html = html.replace(/\{代表者名\}/g, '<span class="tpl-var-empty">{代表者名}</span>');
  html = html.replace(/\x01([^\x01]+)\x01/g, '<span class="tpl-var-filled">$1</span>');
  document.getElementById('tpl-preview').innerHTML = html;
}

function checkAndCopy() {
  const resEl = document.getElementById('check-result');
  const iconEl = document.getElementById('check-icon');
  const textEl = document.getElementById('check-text');
  const discordBtn = document.getElementById('discord-btn');

  // ニックネーム未設定チェック
  if (!nickname) {
    openNnSheet();
    return;
  }

  let missing = [];
  // Instagram IDチェック
  if (!getVal('tpl-instagram')) {
    document.getElementById('err-instagram')?.classList.add('show');
    missing.push('Instagram ID');
  } else {
    document.getElementById('err-instagram')?.classList.remove('show');
  }
  VARS.forEach(v => {
    if (!getVal(v.id)) { document.getElementById(v.errId)?.classList.add('show'); missing.push(v.label); }
    else document.getElementById(v.errId)?.classList.remove('show');
  });

  resEl.classList.remove('ok','ng'); resEl.classList.add('show');
  discordBtn.style.display = 'none';

  if (missing.length > 0) {
    resEl.classList.add('ng');
    iconEl.textContent = '⚠️';
    textEl.textContent = `未入力: ${missing.join('・')}`;
    return;
  }

  const fullText = buildFullText();
  copiedText = fullText;

  if (navigator.clipboard) {
    navigator.clipboard.writeText(fullText).then(() => {
      resEl.classList.add('ok');
      iconEl.textContent = '✅';
      textEl.textContent = `コピーしました！DMに貼り付けてください`;
      discordBtn.style.display = 'flex';
    });
  } else {
    resEl.classList.add('ok');
    iconEl.textContent = '✅';
    textEl.textContent = 'プレビューのテキストをコピーしてください';
    discordBtn.style.display = 'flex';
  }
}

// ── Discord納品 + GAS記録 ──
async function sendToDiscord() {
  const btn = document.getElementById('discord-btn');
  btn.textContent = '送信中...';
  btn.disabled = true;
  try {
    // Discord送信
    await fetch(DISCORD_DELIVER_WEBHOOK, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ content: copiedText })
    });

    const instagramId = getVal('tpl-instagram');
    const now = getToday();

    // GASに納品記録
    await callGas({
      action: 'deliver',
      nickname: nickname,
      companyId: instagramId || getVal('tpl-company'),
      date: now
    });

    // GASに企業ID登録（重複チェック用）
    await callGas({
      action: 'register',
      id: instagramId,
      acct: 'A',
      person: nickname,
      status: '送信済み',
      genre: getVal('tpl-service'),
      date: now
    });

    btn.textContent = `✅ ${nickname} として納品しました！`;
    btn.style.background = '#16A34A';
    setTimeout(() => {
      btn.textContent = '📣 Discordに納品する';
      btn.style.background = '';
      btn.disabled = false;
    }, 3000);
  } catch(e) {
    btn.textContent = '送信失敗 - 再試行';
    btn.disabled = false;
  }
}

// ── GAS通信 ──
async function callGas(payload) {
  try {
    const res = await fetch(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(payload),
      redirect: 'follow'
    });
    const json = await res.json();
    return { ok: true, data: json };
  } catch(e) { return { ok: false, msg: e.message, data: null }; }
}

// ── 自社情報取得 ──
async function fetchSelfInfo() {
  const r = await callGas({ action: 'getSelfInfo' });
  if (r.ok && r.data?.status === 'ok') {
    selfInfo.myCompany = r.data.myCompany || '';
    selfInfo.myRep = r.data.myRep || '';
  }
  updatePreview();
}

// ── 重複チェック ──
function liveCheck() {
  const id = document.getElementById('check-id').value.trim().replace(/^@/,'');
  const el = document.getElementById('dup-result');
  if (!id) { el.classList.remove('show'); return; }
  el.className = 'dup-result show checking';
  document.getElementById('dup-icon').innerHTML = '<div class="spinner"></div>';
  document.getElementById('dup-text').textContent = '確認中...';
  document.getElementById('dup-sub').textContent = 'スプレッドシートを参照しています';
  clearTimeout(checkTimer);
  checkTimer = setTimeout(() => doCheck(id), 600);
}

async function doCheck(id) {
  const el = document.getElementById('dup-result');
  const r = await callGas({ action: 'check', id });
  el.classList.remove('checking');
  if (!r.ok) {
    el.className = 'dup-result show ng';
    document.getElementById('dup-icon').textContent = '❌';
    document.getElementById('dup-text').textContent = '通信エラー';
    document.getElementById('dup-sub').textContent = r.msg;
    return;
  }
  if (r.data?.duplicate) {
    el.className = 'dup-result show ng';
    document.getElementById('dup-icon').textContent = '❌';
    document.getElementById('dup-text').textContent = '送信済み・登録済みです';
    document.getElementById('dup-sub').textContent = `${r.data.acct} / ${r.data.person} / ${r.data.date}`;
  } else {
    el.className = 'dup-result show ok';
    document.getElementById('dup-icon').textContent = '✅';
    document.getElementById('dup-text').textContent = '未送信です';
    document.getElementById('dup-sub').textContent = 'このIDはまだ送信されていません';
  }
}

// ── リスト ──
function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.chip').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  loadList();
}

function debounceSearch() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => loadList(), 500);
}

async function loadList() {
  const body = document.getElementById('list-body');
  const empty = document.getElementById('list-empty');
  const loading = document.getElementById('list-loading');
  const search = document.getElementById('search').value.trim();
  body.innerHTML = ''; empty.style.display = 'none'; loading.style.display = 'block';
  const r = await callGas({ action: 'list', filter: currentFilter, search });
  loading.style.display = 'none';
  if (!r.ok || !r.data) { empty.textContent = '取得失敗'; empty.style.display = 'block'; return; }
  const rows = r.data.rows || [];
  document.getElementById('list-sub').textContent = `全員共通 · ${rows.length}件`;
  if (!rows.length) { empty.textContent = 'データがありません'; empty.style.display = 'block'; return; }
  const ab = a => `<span class="badge b-${a.toLowerCase()}">Acct ${a}</span>`;
  body.innerHTML = rows.map(r =>
    `<div class="list-item">
      <div class="list-main">
        <div class="list-id">@${r.id}</div>
        <div class="list-date">${ab(r.acct)} · ${r.date}</div>
      </div>
    </div>`
  ).join('');
}

// ── ページ遷移 ──
function goPage(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'list') loadList();
}

function getToday() {
  const d = new Date();
  return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

renderNickname();
fetchSelfInfo();
if (!nickname) setTimeout(() => openNnSheet(), 700);
